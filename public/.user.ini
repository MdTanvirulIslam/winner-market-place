; PHP overrides for shared hosting (cPanel reads .user.ini from the docroot).
; Screenshot uploads are 4 MB each (app-validated) and release zips up to
; 200 MB — the host's default 2M/8M limits silently break both.
upload_max_filesize = 256M
post_max_size = 300M
memory_limit = 256M
max_execution_time = 300
